name: Deploy Vue to WordPress

on:
  push:
    branches:
      - main # Укажите ветку, на которую нужно настраивать деплой, например, main или master.

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3 

      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: "20" 

      - name: Install dependencies
        run: npm install

      - name: Build project
        run: npm run build

      - name: Install lftp
        run: sudo apt-get update && sudo apt-get install -y lftp

      - name: Deploy to WordPress
        env:
          FTP_SERVER: ${{ secrets.FTP_SERVER }}
          FTP_USERNAME: ${{ secrets.FTP_USERNAME }}
          FTP_PASSWORD: ${{ secrets.FTP_PASSWORD }}
          FTP_REMOTE_PATH: ${{ secrets.FTP_REMOTE_PATH}}
        run: |
          REMOTE_PATH="${FTP_REMOTE_PATH%/}"
          # Ожидаем, что FTP_REMOTE_PATH - файловый путь (не URL), например:
          # /www/spart.pro/wp-content/themes/spart.pro
          # или /www/spart.pro/wp-content/themes/spart.pro/vue
          # или /www/spart.pro/wp-content/themes/spart.pro/vue/dist
          if [[ "$REMOTE_PATH" == *"/vue/dist" ]]; then
            REMOTE_VUE_DIST="$REMOTE_PATH"
            REMOTE_THEME_DIR="${REMOTE_PATH%/vue/dist}"
          elif [[ "$REMOTE_PATH" == *"/vue" ]]; then
            REMOTE_THEME_DIR="${REMOTE_PATH%/vue}"
            REMOTE_VUE_DIST="$REMOTE_THEME_DIR/vue/dist"
          else
            REMOTE_THEME_DIR="$REMOTE_PATH"
            REMOTE_VUE_DIST="$REMOTE_THEME_DIR/vue/dist"
          fi

          lftp -c "
          set ssl:verify-certificate no;
          set ftp:passive-mode on;
          set ftp:chmod false;
          set net:timeout 120;
          set cmd:verbose true;
          set xfer:log true;
          set log:enable true;
          set log:file /dev/stderr;
          open -u $FTP_USERNAME,$FTP_PASSWORD $FTP_SERVER;
          # Заливаем сборку Vue туда, где подключает WordPress: `.../vue/dist/assets/...`
          mirror -R --delete --verbose ./dist $REMOTE_VUE_DIST;
          # PHP-роутер для WordPress (используется в functions.php через `include(get_template_directory() . '/index.php')`).
          put -O $REMOTE_THEME_DIR ./index.php;
          quit" 